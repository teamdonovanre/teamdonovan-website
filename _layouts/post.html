<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Team Donovan</title>
    <meta name="description" content="{{ page.description }}">
    
    <!-- SVG FAVICON -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='none'><path d='M15 70 L50 30 L85 70' stroke='%23fbbf24' stroke-width='10' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    
    <!-- Tailwind CSS with Typography Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased min-h-screen flex flex-col">

    <!-- FULL-WIDTH GLOBAL NAVBAR -->
    {% include header.html %}

    <!-- ARTICLE MAIN CONTAINER -->
    <main class="flex-grow py-12 px-4 sm:px-6">
        <div class="max-w-4xl mx-auto bg-white text-slate-900 rounded-2xl p-6 sm:p-12 shadow-2xl border border-slate-100">
            
            <!-- Breadcrumbs -->
            <nav class="text-sm text-slate-500 mb-6 flex items-center gap-2">
                <a href="/" class="hover:text-amber-600 transition">Home</a>
                <span>/</span>
                <a href="/blog/" class="hover:text-amber-600 transition">Market Insights</a>
            </nav>

            <!-- Markdown Content Render -->
            <article class="prose prose-slate lg:prose-lg max-w-none 
                            prose-headings:text-slate-900 
                            prose-h1:text-3xl sm:prose-h1:text-4xl prose-h1:font-bold prose-h1:tracking-tight
                            prose-h3:text-xl prose-h3:font-semibold prose-h3:mt-8
                            prose-a:text-amber-600 prose-a:font-semibold hover:prose-a:text-amber-500
                            prose-img:rounded-xl prose-img:shadow-md prose-img:w-full prose-img:object-cover">
                
                {{ content }}

            </article>
        </div>
    </main>

    <!-- FOOTER -->
    {% include footer.html %}

</body>
</html>
