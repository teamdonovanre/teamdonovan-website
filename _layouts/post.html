<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Team Donovan</title>
    <meta name="description" content="{{ page.description }}">
    
    <!-- SVG FAVICON -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='none'><path d='M15 70 L50 30 L85 70' stroke='%23fbbf24' stroke-width='10' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    
    <!-- Tailwind CSS + Typography Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col antialiased">

    <!-- SINGLE GLOBAL HEADER -->
    {% include header.html %}

    <!-- ARTICLE CONTAINER -->
    <main class="flex-grow py-12 px-4 sm:px-6 lg:px-8">
        <article class="max-w-4xl mx-auto bg-white text-slate-900 rounded-2xl shadow-2xl overflow-hidden p-6 sm:p-10 md:p-12">
            
            <!-- Breadcrumb Navigation -->
            <nav class="text-xs font-semibold text-slate-400 mb-6 uppercase tracking-wider">
                <a href="/" class="hover:text-amber-600 transition">Home</a> 
                <span class="mx-2">/</span> 
                <a href="/blog/" class="hover:text-amber-600 transition">Market Insights</a>
            </nav>

            <!-- Article Title -->
            <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight leading-tight mb-8">
                {{ page.title }}
            </h1>

            <!-- Featured Image -->
            {% if page.image %}
            <div class="mb-10 rounded-xl overflow-hidden shadow-md">
                <img src="{{ page.image }}" alt="{{ page.title }}" class="w-full h-auto max-h-[480px] object-cover">
            </div>
            {% endif %}

            <!-- Post Content (Rendered from Markdown) -->
            <div class="prose prose-lg prose-slate max-w-none prose-headings:font-bold prose-a:text-amber-600 hover:prose-a:text-amber-700 prose-img:rounded-xl">
                {{ content }}
            </div>

        </article>
    </main>

    <!-- FOOTER -->
    <footer class="bg-slate-950 border-t border-slate-900 text-slate-500 py-8 text-center text-sm">
        <p>&copy; 2026 Team Donovan. All rights reserved.</p>
    </footer>

</body>
</html>
